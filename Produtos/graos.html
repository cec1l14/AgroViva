        @import url('https://fonts.googleapis.com/css2?family=Inter&display=swap'); /* Fonte Inter */
       
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            font-family: 'Open Sans', sans-serif;
            overflow-x: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 3800px;
            height: 108px;
            background-color: #e0dcdc;
        }
        .corner-box {
            position: absolute;
            top: 0;
            right: 0;
            width: 108px;
            height: 108px;
            background-color: #a4d041;
        }
        .menu {
            position: absolute;
            top: 39.9px;
            left: 2550.8px;
            width: 656.5px;
            height: 28.2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu a {
            text-decoration: none;
            color: black;
            font-size: 30px;
        }
        .menu .active {
            color: #a5c32a;
        }
        .menu .produtos-graos {
            position: relative;
            cursor: default;
            font-size: 35px;
        }
        .menu .produtos-graos .produto {
            color: #a5c32a;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s;
        }
        .menu .produtos-graos .produto:hover {
            transform: scale(1.1);
        }
        .bottom-box {
            position: absolute;
            top: 648.8px;
            left: 0;
            width: 100vw;
            height: 1300px;
            background-color: #a4d041;
        }
        #divBusca {
            background-color:#e0dcdc;
            border:solid 1px;
            border-radius:15px;
            width: 386.6px;
            height: 38.7px;
            position: absolute;
            top: 39.9px;
            left: 49.3px;
            display: flex;
            align-items: center;
            padding: 5px;
        }
        #txtBusca {
            flex-grow: 1;
            background-color: transparent;
            padding-left: 5px;
            font-style: italic;
            font-size: 25px;
            border: none;
            height: 100%;
            width: 100%;
            outline: none;
        }
        #btnBusca {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
   
        .graos-label {
            position: absolute;
            top: 310.6px;
            left: 160.3px;
            width: 410.1px;
            height: 85.6px;
            color: #a5c32a;
            font-size: 100px;
            font-weight: bold;
        }

        .decoracao {
            position: absolute;
            left: 470.4px;
            top: 310.3px;
            width: 25.3px;
            height: 26.6px;
            background-color: #a5c32a;
        }
       
        .visualizacao-label {
            position: absolute;
            top: 396px;
            left: 115.3px;
            width: 478.7px;
            height: 127.4px;
            font-size: 40px;
            font-weight: arial;
            text-align: center;
            line-height: 127.4px;
        }

        /* Estilo para a seção de classificação */
        .classificacao-container {
            position: absolute;
            top: 550px;
            left: 150px;
            width: 350px;
            height: 60px;
            border: 2px solid #000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .classificacao-container .titulo {
            font-size: 40px;
            color: black;
        }

        .classificacao-container .seta {
            font-size: 30px;
            color: black;
            transition: transform 0.3s;
        }

        .classificacao-container .seta:hover {
            transform: scale(1.2); /* Aumentando a escala da seta ao passar o mouse */
        }

        .classificacoes {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background-color: white;
            border-radius: 10px;
            width: 500px;
            position: absolute;
            top: 650px;
            left: 140px;
        }

        .classificacoes p {
            margin: 20px 0;
            font-size: 40px;
            color: black;
        }

        .classificacao-container.active .seta {
            transform: rotate(180deg); /* Roda a seta para baixo */
        }

        .classificacao-container.active + .classificacoes {
            display: block;
        }

        .classificacao-container:hover .seta,
        .classificacoes p:hover {
            cursor: pointer;
        }

        /* Estilo da imagem da uva */
        .imagem-cafe {
            position: absolute;
            top: 500.6px;
            left: 1000.4px;
            width: 350.8px;
            height: 300.8px;
            border: 7px solid #303f09;
        }
        .imagem-feijao {
            position: absolute;
            top: 500.6px;
            left: 1700.4px;
            width: 350.8px;
            height: 300.8px;
            border: 7px solid #303f09;
        }
        .imagem-g_bico{
            position: absolute;
            top: 500.6px;
            left: 2400.4px;
            width: 350.8px;
            height: 300.8px;
            border: 7px solid #303f09;
        }
        .imagem-arroz {
            position: absolute;
            top: 1100.6px;
            left: 1000.4px;
            width: 350.8px;
            height: 300.8px;
            border: 7px solid #303f09;
        }
        .imagem-gergelim {
            position: absolute;
            top: 1100.6px;
            left: 1700.4px;
            width: 350.8px;
            height: 300.8px;
            border: 7px solid #303f09;
        }
        .imagem-chia {
            position: absolute;
            top: 1100.6px;
            left: 2400.4px;
            width: 350.8px;
            height: 300.8px;
            border: 7px solid #303f09;
        }

        /* Novo estilo para o texto Agroviva */
        .agroviva-text {
            position: absolute;
            top: 830px;
            left: 1000.4px;
            font-size: 35px;
            color: #a5c32a;
            font-weight: bold;
        }

        .agroviva-text2 {
            position: absolute;
            top: 830px; 
            left: 1700.4px; 
            font-size: 35px;
            color: #a5c32a;
            font-weight: bold;
        }

        .agroviva-text3 {
            position: absolute;
            top: 830px;
            left: 2400.4px;
            font-size: 35px;
            color: #a5c32a;
            font-weight: bold;
        }

        .agroviva-text4 {
            position: absolute;
            top: 1430px;

        .agroviva-text5 {

            font-size: 35px;
            color: #a5c32a;
            font-weight: bold;
        }
        .agroviva-text6 {
            position: absolute;
            top: 1430px;
            left: 2400.4px;
            font-size: 35px;
            color: #a5c32a;
            font-weight: bold;
        }
        .cafe-text {
            position: absolute;
            top: 890px;
            left: 1000.4px;
            font-size: 35px;
            color:black;
            font-weight: bold;
        } 
        .feijao-text {
            position: absolute;
            top: 890px;

        .gbico-text {

        .arroz-text {

        .gergelim-text {

        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="corner-box"></div>
    <nav class="menu">
        <div class="produtos-graos">
            <span class="produto">Produtos</span>/<span>Grãos</span>
        </div>
    </nav>
    <div id="divBusca">
        <input type="text" id="txtBusca" placeholder="Buscar..."/>
        <img src="lupa.png" id="btnBusca" alt="Buscar"/>
    </div>
    <div class="decoracao"></div>
    <div class="graos-label">Grãos</div>
    <div class="visualizacao-label">Apenas visualização</div>

    <!-- Texto "Agroviva" -->
    <div class="agroviva-text">Agroviva</div>
    <div class="agroviva-text2">Agroviva</div>
    <div class="agroviva-text3">Agroviva</div>
    <div class="agroviva-text4">Agroviva</div>
    <div class="agroviva-text5">AgroViva</div>
    <div class="agroviva-text6">AgroViva</div>

    <!-- Texto Frutas -->
     <div class="cafe-text">Café</div>
     <div class="feijao-text">Feijão</div>
     <div class="gbico-text">Grão de Bico</div>
     <div class="arroz-text">Arroz</div>
     <div class="gergelim-text">Gergelim</div> 
     <div class="chia-text">Chia</div>
    <!-- Seção de classificação -->
    <div class="classificacao-container">
        <span class="titulo">Classificação</span>
        <span class="seta">&#x2191;</span>
    </div>
    <div class="classificacoes">
        <p>Produto orgânico (5)</p>
        <p>Cultivado Localmente (4)</p>
        <p>Fonte de proteína (2)</p>
        <p>Ideal para sopas (5)</p>
        <p>Alta durabilidade (4)</p>
    </div>

    <div class="imagem-cafe">
        <img src="café.jpeg" alt="Café" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    <div class="imagem-feijao">
        <img src="feijão.jpeg" alt="Feijão" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    <div class="imagem-g_bico">
        <img src="grao de bico.jpeg" alt="Grão de Bico" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    <div class="imagem-arroz">
        <img src="arroz.jpeg" alt="Arooz" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    <div class="imagem-gergelim">
        <img src="gergelim.jpeg" alt="Gergelim" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    <div class="imagem-chia">
        <img src="chia.jpeg" alt="Chia" style="width: 100%; height: 100%; object-fit: cover;">
    </div>

    <script>
        // Script para alternar a visibilidade das classificações e mudar a direção da seta
        const classificacaoContainer = document.querySelector('.classificacao-container');
        const classificacoes = document.querySelector('.classificacoes');

        classificacaoContainer.addEventListener('click', () => {
            classificacaoContainer.classList.toggle('active');
        });
    </script>
</body>
