<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroViva</title>
    <link rel="stylesheet" href="https://meyerweb.com/eric/tools/css/reset/reset.css">
    <link rel="stylesheet" href="Cadastro.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href= "https://unpkg.com/font-awesome/css/font-awesome.min.css"> 
</head>
<body>
    <div>
        <main class="container">
            <form action="">
                <h1> Cadastro </h1>
                <div class="input-box">
                    <input placeholder="Nome" type="nome" name="" id="nome">
                    <i class="bx bxs-user"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Email" type="email" name="" id="email">
                    <i class="fa fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input placeholder="Senha" type="password" name="" id="senha">
                    <i class="bx bxs-lock-alt"></i>
                </div>

                <div class="senhas">
                    <label>
                        <input type="checkbox">
                        Produtor
                            <input type="checkbox">
                            Empresário
                        </label>

                <button type="submit" class="login" onclick="submeterFormulario()"">Entrar</button>
            </form>  
        </main>
    </div>
</body>
</html>
